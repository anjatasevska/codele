# Local PostgreSQL for development (same engine as production / Neon)
services:
  postgres:
    image: postgres:16-alpine
    container_name: codele-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codele}
      POSTGRES_USER: ${POSTGRES_USER:-codele}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codele}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - codele_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codele} -d ${POSTGRES_DB:-codele}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  codele_pg_data:
    name: codele_pg_data
