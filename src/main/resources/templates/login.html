<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Codele</title>
  <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div class="container">
  <div th:replace="~{fragments/nav :: main-nav('Login')}"></div>
  <div class="card">
    <p class="warn" th:if="${param.denied}">Access denied. You need an admin account for the admin panel.</p>
    <form method="post" th:action="@{/login}">
      <label>Username</label>
      <input class="input" name="username" autocomplete="username" />
      <label>Password</label>
      <input class="input" type="password" name="password" autocomplete="current-password" />
      <button class="btn" type="submit">Sign in</button>
    </form>
  </div>
</div>
</body>
</html>
