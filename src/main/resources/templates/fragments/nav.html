<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="main-nav(title)" class="nav">
  <h2 th:text="${title}">Codele</h2>
  <div class="nav-links">
    <a th:href="@{/}">Home</a>
    <a th:href="@{/play/daily}">Daily</a>
    <a th:href="@{/archive}">Archive</a>
    <a th:href="@{/how-to-play}">How to play</a>
    <a th:href="@{/leaderboard}">Leaderboard</a>
    <a th:href="@{/stats}">Stats</a>
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}" class="nav-admin">Admin</a>
    <a sec:authorize="!isAuthenticated()" th:href="@{/login}">Login</a>
    <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn-link">Logout</button>
    </form>
  </div>
</nav>
</body>
</html>
